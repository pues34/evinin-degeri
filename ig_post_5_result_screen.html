    <!DOCTYPE html>
    <html lang="tr">
    <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { appleDark: '#1d1d1f', appleBlue: '#2997ff' } } }
            }
        </script>
        <style>
            body { background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 1080px; width: 1080px; margin: 0; overflow: hidden; color: #1e293b; }
            .bg-pattern { position: absolute; inset: 0; background-color: #f8fafc; opacity: 0.8; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 30px 30px; }
            .glass-panel { background: white; border: 1px solid #e2e8f0; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border-radius: 2rem; }
            .chart-bar { background: linear-gradient(to top, #2997ff, #60a5fa); border-radius: 8px 8px 0 0; }
        </style>
    </head>
    <body class="relative font-sans">
        <div class="bg-pattern"></div>
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-blue-100 rounded-full blur-[100px] opacity-60"></div>
        
        <div class="relative z-10 w-[92%] h-[92%] flex flex-col p-12 justify-between">
            
            <!-- Header -->
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-appleDark rounded-xl flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </div>
                    <div class="font-bold text-2xl tracking-tight text-appleDark">Evinin Değeri</div>
                </div>
                <div class="text-sm font-bold text-appleBlue tracking-widest bg-blue-50 px-5 py-2 rounded-full border border-blue-100">DETAYLI RAPOR</div>
            </div>

            <!-- Main Panel (Result Screen Mockup) -->
            <div class="glass-panel w-full p-10 flex flex-col gap-8 shadow-2xl mt-8">
                
                <!-- Price Section -->
                <div class="flex justify-between items-end border-b border-gray-100 pb-8">
                    <div>
                        <p class="text-gray-400 font-bold tracking-widest text-sm mb-2">TAHMİNİ PİYASA DEĞERİ</p>
                        <h1 class="text-6xl font-black text-appleDark tracking-tight flex items-baseline gap-2">
                            14.250.000 <span class="text-3xl text-gray-400 font-semibold tracking-normal">TL</span>
                        </h1>
                    </div>
                    <div class="text-green-500 font-bold text-2xl flex items-center gap-2 bg-green-50 px-4 py-2 rounded-xl">
                        ↑ %4.2 <span class="text-sm text-green-600/70">(Son 1 Ay)</span>
                    </div>
                </div>

                <!-- Scores & Metrics -->
                <div class="grid grid-cols-3 gap-6">
                    <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">🤖</span>
                            <p class="text-gray-500 font-bold text-sm">Yapay Zeka Skoru</p>
                        </div>
                        <p class="text-4xl font-black text-appleDark">%98</p>
                    </div>
                    <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">🎯</span>
                            <p class="text-gray-500 font-bold text-sm">Bölge Verimliliği</p>
                        </div>
                        <p class="text-4xl font-black text-appleDark">A+</p>
                    </div>
                    <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-3xl">⏱️</span>
                            <p class="text-gray-500 font-bold text-sm">Amortisman</p>
                        </div>
                        <p class="text-4xl font-black text-appleDark">14 Yıl</p>
                    </div>
                </div>

                <!-- Chart Mockup -->
                <div class="mt-4">
                    <p class="text-appleDark font-bold mb-6 text-xl">Son 6 Aylık Fiyat Trendi</p>
                    <div class="flex items-end justify-between h-40 gap-4 px-4">
                        <div class="w-full chart-bar h-[40%] opacity-50 relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-gray-400">Eki</span></div>
                        <div class="w-full chart-bar h-[45%] opacity-60 relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-gray-400">Kas</span></div>
                        <div class="w-full chart-bar h-[55%] opacity-70 relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-gray-400">Ara</span></div>
                        <div class="w-full chart-bar h-[65%] opacity-80 relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-gray-400">Oca</span></div>
                        <div class="w-full chart-bar h-[85%] opacity-90 relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-gray-400">Şub</span></div>
                        <div class="w-full chart-bar h-[100%] shadow-[0_0_20px_rgba(41,151,255,0.4)] relative"><span class="absolute -bottom-8 left-1/2 -translate-x-1/2 text-sm font-bold text-appleBlue">Mar</span></div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-10">
                <p class="text-3xl font-bold tracking-tight text-appleDark mb-2">Evinizin detaylı raporuna anında ulaşın.</p>
                <p class="text-xl text-appleBlue font-black tracking-wide">evindegeri.com</p>
            </div>
            
        </div>
    </body>
    </html>
