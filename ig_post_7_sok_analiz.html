<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { appleDark: '#1d1d1f', appleBlue: '#2997ff', appleRed: '#ff3b30' } } }
        }
    </script>
    <style>
        body {
            background: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1080px;
            width: 1080px;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 120%, rgba(41, 151, 255, 0.4) 0%, transparent 60%), radial-gradient(circle at 80% 0%, rgba(255, 59, 48, 0.3) 0%, transparent 40%);
        }
    </style>
</head>

<body class="relative">
    <div class="bg-gradient"></div>
    <div class="relative z-10 w-[92%] h-[92%] p-16 flex flex-col justify-between">

        <div
            class="inline-block self-start px-6 py-2 bg-red-500 text-white font-bold tracking-widest rounded-full mb-8 uppercase shadow-[0_0_20px_rgba(255,59,48,0.5)]">
            🎯 Şok Eden Analiz</div>

        <div class="flex-1 flex flex-col justify-center">
            <h1 class="text-[5rem] font-black tracking-tight leading-[1] mb-10 text-white">
                Türkiye'deki ev<br>sahiplerinin <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-yellow-400">%68'i</span><br>yanılıyor.
            </h1>

            <div
                class="bg-white/10 backdrop-blur-xl border border-white/20 p-12 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                <div class="absolute -right-20 -top-20 text-[15rem] leading-none opacity-10">🤔</div>
                <p class="text-[2.2rem] font-semibold text-gray-200 leading-snug relative z-10">
                    Evinizin gerçek piyasa değeri <span
                        class="text-white font-black underline decoration-appleBlue decoration-4 underline-offset-8">düşündüğünüzden
                        çok daha yüksek</span> olabilir.
                </p>
            </div>

            <div class="mt-12 flex items-center gap-6">
                <div class="w-16 h-1 bg-white/30"></div>
                <p class="text-2xl font-medium text-gray-400">Yapay zeka ile 5 saniyede gerçeği öğrenin.</p>
            </div>
        </div>

        <div
            class="flex justify-between items-center bg-white/5 backdrop-blur-md rounded-full px-8 py-4 border border-white/10">
            <div class="text-appleDark bg-white px-6 py-2 rounded-full font-bold text-lg flex items-center gap-2">👇
                ÜCRETSİZ HESAPLA</div>
            <div class="text-3xl font-black text-appleBlue tracking-tighter">evindegeri.com</div>
        </div>
    </div>
</body>

</html>
