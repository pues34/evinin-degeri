<!DOCTYPE html>
<html lang="tr">

<head>

    <script src="https://cdn.tailwindcss.com"></script>

        body {

            display: flex;
            justify-content: center;
            align-items: center;
            height: 1080px;
            width: 1080px;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body class="relative">
    <!-- Subtly glowing dark background for the icon -->

    <!-- The massive centered icon -->

        <svg class="w-[300px] h-[300px] text-blue-600 drop-shadow-2xl" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"

</html>
