<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { appleDark: '#1d1d1f', appleBlue: '#2997ff' } } }
        }
    </script>
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 1080px;
            width: 1080px;
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .hud-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(41, 151, 255, 0.3);
            box-shadow: inset 0 0 30px rgba(41, 151, 255, 0.1), 0 0 50px rgba(41, 151, 255, 0.2);
        }
    </style>
</head>

<body class="relative">
    <div class="absolute inset-0 bg-[url('https://transparenttextures.com/patterns/connected.png')] opacity-10"></div>
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[900px] bg-appleBlue/20 blur-[180px] rounded-full point-events-none">
    </div>

    <div class="relative z-10 w-[92%] h-[92%] p-16 flex flex-col justify-between items-center text-center">

        <div class="flex items-center gap-4 bg-appleBlue/20 border border-appleBlue/40 px-8 py-3 rounded-full mb-10">
            <span class="w-4 h-4 bg-appleBlue rounded-full animate-pulse shadow-[0_0_15px_#2997ff]"></span>
            <span class="text-appleBlue font-bold tracking-widest uppercase">Canlı Sistem Verisi</span>
        </div>

        <h1 class="text-[3.5rem] font-bold tracking-tight text-gray-300 leading-tight">
            Sadece son <span class="text-white font-black underline decoration-appleBlue decoration-4">24
                saatte</span><br>İstanbul'da tam...
        </h1>

        <div
            class="hud-card w-full rounded-[3rem] p-16 my-12 flex flex-col items-center justify-center relative overflow-hidden">
            <div
                class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-appleBlue to-transparent opacity-50">
            </div>
            <div
                class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-appleBlue to-transparent opacity-50">
            </div>

            <div class="text-[9rem] font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-blue-200 tracking-tighter leading-none"
                style="text-shadow: 0 20px 50px rgba(41,151,255,0.5);">
                12.450
            </div>
            <div class="text-[2.5rem] font-black text-appleBlue tracking-widest mt-4 uppercase">Evin Değeri Hesaplandı
            </div>
        </div>

        <p class="text-[2rem] font-medium text-gray-400 leading-snug max-w-2xl">
            Siz hala bekliyor musunuz?<br>Komşunuz <span class="text-white font-bold">satış fiyatını</span> çoktan
            öğrendi.
        </p>

        <div class="w-full flex justify-between items-center mt-auto border-t border-white/10 pt-8">
            <div class="text-gray-500 font-bold uppercase tracking-widest">ÜCRETSİZ & ANINDA</div>
            <div
                class="text-3xl font-black text-white bg-appleBlue px-8 py-4 rounded-full shadow-[0_0_30px_rgba(41,151,255,0.4)] transform hover:scale-105 transition-transform">
                Şimdi Hesapla →
            </div>
            <div class="text-gray-500 font-bold tracking-tight text-xl">EVINDEGERI.COM</div>
        </div>
    </div>
</body>

</html>
