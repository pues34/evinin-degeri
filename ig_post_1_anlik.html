<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { appleDark: '#1d1d1f', appleBlue: '#2997ff', appleGray: '#f5f5f7' }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5f7 0%, #e2e8f0 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 1080px;
            width: 1080px;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
        }

        .glow-blue {
            position: absolute;
            top: 0;
            right: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(41, 151, 255, 0.15) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .glow-purple {
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>

<body class="relative text-appleDark">
    <div class="glow-blue"></div>
    <div class="glow-purple"></div>
    <div
        class="relative z-10 w-[92%] h-[92%] bg-white/30 backdrop-blur-3xl rounded-[3.5rem] border border-white/50 shadow-2xl flex flex-col justify-between p-16">

        <!-- Header -->
        <div class="flex items-center gap-5">
            <div class="w-20 h-20 bg-appleDark rounded-2xl flex items-center justify-center shadow-xl">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
            </div>
            <div>
                <h1 class="text-[2.5rem] font-extrabold tracking-tight">Evinin Değeri</h1>
                <p class="text-xl text-appleBlue font-bold tracking-[0.2em] mt-1 opacity-90">ANLIK DEĞERLEME</p>
            </div>
        </div>

        <!-- Content -->
        <div class="flex flex-col items-center text-center mt-12">
            <h2 class="text-[4rem] font-black tracking-tight leading-[1.1] mb-8 text-appleDark">
                Saniyeler İçinde<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-appleBlue to-purple-600">Gerçek Piyasa
                    Değeri</span>
            </h2>
            <p class="text-[1.8rem] text-gray-500 mb-14 font-medium leading-relaxed max-w-3xl">
                Ekspertiz bekleme, tahminde bulunma. Yapay zeka ile evinin gerçek satılabilir fiyatını anında öğren.
            </p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-12 w-full mx-auto shadow-2xl flex items-center justify-between mb-12">
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center border border-blue-100">
                    <svg class="w-10 h-10 text-appleBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <div class="text-left">
                    <p class="text-2xl font-bold text-appleDark mb-1">Adresini Gir</p>
                    <div class="h-2 w-32 bg-gray-200 rounded-full overflow-hidden">
                        <div class="h-full bg-appleBlue w-2/3"></div>
                    </div>
                </div>
            </div>
            <div><svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3">
                    </path>
                </svg></div>
            <div class="text-center bg-gray-900 text-white py-5 px-10 rounded-2xl shadow-xl">
                <p class="text-sm font-bold tracking-widest text-gray-400 mb-1">SONUÇ</p>
                <p class="text-4xl font-black">12.500.000 <span class="text-xl">TL</span></p>
            </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-between px-6 pb-2">
            <div class="flex gap-4">
                <span
                    class="px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-full text-lg font-bold shadow-sm">🚀
                    Ücretsiz Sorgula</span>
                <span
                    class="px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-full text-lg font-bold shadow-sm">📍
                    Sadece İstanbul</span>
            </div>
            <div class="text-appleDark font-bold text-3xl tracking-tight">www.evindegeri.com</div>
        </div>
    </div>
</body>

</html>
